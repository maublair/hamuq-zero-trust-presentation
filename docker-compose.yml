services:
  zero-trust:
    image: nginx:alpine-slim
    restart: unless-stopped
    networks:
      bcode_gateway:
        ipv4_address: 172.27.0.11
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ./main:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  bcode_gateway:
    external: true
