<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-Trust System | Fundación Hamuq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Observer.min.js"></script>
  <style>
    :root {
      --teal-950: #082f2d;
      --teal-900: #0f4d49;
      --teal-700: #137f76;
      --teal-500: #24a697;
      --orange-800: #cb640f;
      --orange-700: #f58220;
      --orange-500: #ffac49;
      --paper: #f5f7f8;
      --white: #fff;
      --ink-950: #102028;
      --ink-800: #293846;
      --ink-700: #4f6172;
      --ink-500: #748595;
      --line: rgba(16, 24, 32, 0.12);
      --shadow: 0 22px 48px rgba(7, 45, 44, 0.14);
      --danger: #dc3f51;
      --warning: #f2a33c;
      --success: #1ca07c;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Source Sans 3", sans-serif;
      color: var(--ink-950);
      background:
        radial-gradient(circle at 18% 18%, rgba(19,127,118,0.18), transparent 26%),
        radial-gradient(circle at 82% 12%, rgba(245,130,32,0.16), transparent 20%),
        linear-gradient(160deg, #eef4f4 0%, #faf7f1 50%, #eef2f6 100%);
    }

    body { text-transform: none; }
    button { font: inherit; }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .app-shell::before,
    .app-shell::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(26px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }

    .app-shell::before {
      width: 30vw;
      height: 30vw;
      top: -8vw;
      right: -6vw;
      background: radial-gradient(circle, rgba(19,127,118,0.48), transparent 62%);
    }

    .app-shell::after {
      width: 28vw;
      height: 28vw;
      bottom: -10vw;
      left: -8vw;
      background: radial-gradient(circle, rgba(245,130,32,0.34), transparent 62%);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 30;
      padding: 16px 24px 0;
      pointer-events: none;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      box-shadow: 0 16px 35px rgba(7, 45, 44, 0.08);
      backdrop-filter: blur(16px);
    }

    .brand-logos {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand img { height: 34px; width: auto; object-fit: contain; }

    .brand img.logo-blaircode { height: 28px; }
    .brand-copy { display: grid; gap: 2px; }
    .brand-copy span {
      font-family: "Montserrat", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-500);
    }

    .brand-copy strong {
      font-family: "Montserrat", sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--teal-950);
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .meta-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      box-shadow: 0 16px 35px rgba(7, 45, 44, 0.08);
      color: var(--ink-700);
      font-size: 0.88rem;
      backdrop-filter: blur(16px);
    }

    .progress {
      margin-top: 14px;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: rgba(16, 24, 32, 0.08);
      overflow: hidden;
      pointer-events: none;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--teal-700), var(--orange-700));
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .deck {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    section.panel {
      position: fixed;
      inset: 0;
      visibility: hidden;
      padding: 94px 0 72px;
    }

    .outer, .inner {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .panel-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 24%, rgba(19,127,118,0.16), transparent 24%),
        radial-gradient(circle at 84% 15%, rgba(245,130,32,0.14), transparent 20%),
        linear-gradient(160deg, rgba(255,255,255,0.95), rgba(244,247,249,0.94));
    }

    .panel--teal .panel-bg {
      background:
        radial-gradient(circle at 16% 24%, rgba(19,127,118,0.22), transparent 24%),
        radial-gradient(circle at 84% 15%, rgba(35,166,151,0.14), transparent 18%),
        linear-gradient(160deg, rgba(238,250,248,0.96), rgba(246,248,249,0.95));
    }

    .panel--orange .panel-bg {
      background:
        radial-gradient(circle at 18% 20%, rgba(245,130,32,0.16), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(19,127,118,0.12), transparent 18%),
        linear-gradient(160deg, rgba(255,249,241,0.96), rgba(247,249,251,0.95));
    }

    .panel-body {
      position: relative;
      z-index: 2;
      width: min(1160px, calc(100vw - 40px));
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(320px, 0.96fr);
      gap: clamp(22px, 2.6vw, 36px);
      align-items: center;
    }

    .panel-body--single { grid-template-columns: minmax(0, 1fr); }
    .panel-body--dense { align-items: start; padding-top: 12px; }

    .copy-col {
      max-width: 640px;
      width: 100%;
      display: grid;
      gap: 16px;
      align-content: center;
      justify-self: center;
    }

    .copy-col.centered {
      margin: 0 auto;
      justify-items: center;
      text-align: center;
    }

    .copy-col.copy-col--dense {
      max-width: 720px;
      gap: 12px;
      align-content: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(7, 45, 44, 0.08);
      font-family: "Montserrat", sans-serif;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal-900);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal-700), var(--orange-700));
      box-shadow: 0 0 0 6px rgba(19,127,118,0.08);
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: var(--teal-950);
    }

    h1 { font-size: clamp(2.6rem, 5vw, 5.2rem); max-width: 11ch; }
    h2 { font-size: clamp(1.8rem, 3.4vw, 3.45rem); max-width: 15ch; }
    .centered h1, .centered h2 { max-width: 14ch; }

    .lede {
      margin: 0;
      max-width: 60ch;
      font-size: clamp(0.98rem, 1.34vw, 1.12rem);
      line-height: 1.58;
      color: var(--ink-800);
    }

    .support-line {
      margin: 0;
      max-width: 64ch;
      font-size: 0.9rem;
      line-height: 1.48;
      color: var(--ink-700);
    }

    .keyline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(19,127,118,0.1);
      border: 1px solid rgba(19,127,118,0.18);
      color: var(--teal-900);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .tag--warm {
      background: rgba(245,130,32,0.1);
      border-color: rgba(245,130,32,0.18);
      color: var(--orange-800);
    }

    .metrics-row, .cards-grid, .flow-row, .role-row, .comparison, .modal-grid {
      width: 100%;
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      max-width: 820px;
    }

    .metric, .card, .flow-node, .role-card, .comparison-box {
      border-radius: 24px;
      background: rgba(255,255,255,0.99);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 18px;
      min-height: 118px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .metric strong {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(1.28rem, 2.6vw, 2rem);
      line-height: 1;
      color: var(--teal-900);
    }

    .metric span, .card p, .flow-node span, .role-card span, .comparison-box li {
      color: var(--ink-700);
      line-height: 1.48;
      font-size: 0.93rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 820px;
    }

    .cards-grid.cards-grid--three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 820px;
    }

    .cards-grid.cards-grid--wide { max-width: 860px; }

    .card {
      padding: 16px;
      min-height: 124px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(19,127,118,0.14), rgba(245,130,32,0.14));
      color: var(--teal-950);
      font-family: "Montserrat", sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .card h3 { font-size: 0.94rem; line-height: 1.14; }

    .card button, .hotspot {
      width: 100%;
      padding: 0;
      border: 0;
      background: none;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
    }

    .cta, .visual-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: "Montserrat", sans-serif;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .cta {
      margin-top: auto;
      color: var(--teal-900);
    }

    .cta::before, .visual-cta::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange-700);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(245,130,32,0.55); }
      70% { box-shadow: 0 0 0 12px rgba(245,130,32,0); }
      100% { box-shadow: 0 0 0 0 rgba(245,130,32,0); }
    }

    .visual-col {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 300px;
    }

    .visual-shell {
      position: relative;
      width: min(100%, 490px);
      min-height: 320px;
      border-radius: 32px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.98);
      box-shadow: 0 26px 50px rgba(7,45,44,0.16);
      overflow: hidden;
      padding: 22px;
    }

    .visual-shell.is-clickable { cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .visual-shell.is-clickable:hover { transform: translateY(-4px); box-shadow: 0 32px 60px rgba(7,45,44,0.18); }

    .visual-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(19,127,118,0.08), transparent 40%),
        radial-gradient(circle at 78% 18%, rgba(245,130,32,0.12), transparent 22%);
      pointer-events: none;
    }

    .visual-shell svg { width: 100%; height: 100%; }

    .visual-caption {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--ink-500);
    }

    .visual-cta {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(8,47,45,0.9);
      color: var(--white);
      box-shadow: 0 12px 24px rgba(7,45,44,0.2);
    }

    .flow-row, .role-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      max-width: 920px;
    }

    .role-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 860px;
    }

    .flow-node, .role-card {
      padding: 15px;
      min-height: 128px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .flow-node strong, .role-card strong {
      font-family: "Montserrat", sans-serif;
      font-size: 0.96rem;
      color: var(--teal-950);
    }

    .flow-node .step {
      font-size: 0.78rem;
      color: var(--orange-800);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .comparison {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      max-width: 920px;
    }

    .comparison-box {
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .comparison-box h3 { font-size: 1rem; }
    .comparison-box ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 10px; }
    .comparison-box li::before { margin-right: 8px; font-weight: 800; }
    .comparison-box.bad li::before { content: "×"; color: var(--danger); }
    .comparison-box.good li::before { content: "✓"; color: var(--success); }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(7,18,24,0.58);
      backdrop-filter: blur(18px);
    }

    .modal-layer.active { display: flex; }

    .modal-card {
      width: min(920px, 100%);
      max-height: min(88vh, 900px);
      overflow-y: auto;
      background: rgba(255,255,255,0.98);
      border-radius: 32px;
      border: 1px solid var(--line);
      padding: 28px 28px 26px;
      box-shadow: 0 28px 80px rgba(7,18,24,0.34);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .modal-head h3 { font-size: clamp(1.4rem, 2vw, 1.95rem); }
    .modal-head p {
      margin: 6px 0 0;
      color: var(--ink-700);
      line-height: 1.58;
      max-width: 62ch;
    }

    .modal-close {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 0;
      background: var(--teal-950);
      color: var(--white);
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 16px 30px rgba(7,45,44,0.2);
    }

    .modal-body { display: grid; gap: 18px; color: var(--ink-800); }
    .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .modal-box {
      padding: 18px;
      border-radius: 22px;
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .modal-box h4 {
      margin-bottom: 8px;
      font-size: 1rem;
      color: var(--teal-900);
    }

    .modal-box p, .modal-body ul {
      margin: 0;
      color: var(--ink-700);
      line-height: 1.58;
    }

    .modal-body ul {
      padding-left: 18px;
      display: grid;
      gap: 10px;
    }

    .nav-cluster {
      position: fixed;
      right: 20px;
      bottom: 14px;
      z-index: 35;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      border: 1px solid var(--line);
      box-shadow: 0 16px 35px rgba(7,45,44,0.12);
      backdrop-filter: blur(16px);
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(160deg, var(--teal-700), var(--teal-900));
      color: var(--white);
      cursor: pointer;
      font-size: 1.15rem;
      box-shadow: 0 12px 24px rgba(19,127,118,0.24);
    }

    .nav-btn--ghost {
      background: linear-gradient(160deg, var(--orange-700), var(--orange-800));
      box-shadow: 0 12px 24px rgba(245,130,32,0.24);
    }

    .nav-btn--neutral {
      width: auto;
      padding: 0 14px;
      border-radius: 999px;
      background: linear-gradient(160deg, #1d2b36, #30404d);
      box-shadow: 0 12px 24px rgba(16,24,32,0.18);
      font-family: "Montserrat", sans-serif;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav-info {
      min-width: 116px;
      padding: 0 10px 0 4px;
      display: grid;
      gap: 2px;
    }

    .nav-info strong {
      font-family: "Montserrat", sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-500);
    }

    .nav-info span {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      color: var(--teal-950);
    }

    .scroll-hint {
      position: fixed;
      left: 20px;
      bottom: 18px;
      z-index: 35;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      box-shadow: 0 16px 35px rgba(7,45,44,0.12);
      color: var(--ink-700);
      font-size: 0.72rem;
      backdrop-filter: blur(16px);
    }

    .scroll-hint .wheel {
      width: 20px;
      height: 32px;
      border-radius: 999px;
      border: 2px solid rgba(16, 24, 32, 0.22);
      position: relative;
    }

    .scroll-hint .wheel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 5px;
      width: 4px;
      height: 7px;
      border-radius: 999px;
      background: var(--teal-700);
      transform: translateX(-50%);
      animation: wheelMove 1.6s ease-in-out infinite;
    }

    @keyframes wheelMove {
      0%, 100% { transform: translate(-50%, 0); opacity: 1; }
      50% { transform: translate(-50%, 10px); opacity: 0.25; }
    }

    .panel h1,
    .panel h2,
    .panel .lede,
    .panel .support-line,
    .panel .tag,
    .panel .metric,
    .panel .card,
    .panel .visual-shell,
    .panel .flow-node,
    .panel .role-card,
    .panel .comparison-box { will-change: transform, opacity; }

    @media (max-width: 1100px) {
      .panel-body { grid-template-columns: minmax(0, 1fr); }
      .visual-col { min-height: 230px; }
      .metrics-row,
      .cards-grid.cards-grid--three,
      .flow-row,
      .role-row,
      .comparison { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .topbar { padding: 12px 14px 0; }
      .topbar-meta { display: none; }
      .brand { gap: 10px; padding: 9px 12px; }
      .brand img { height: 28px; }
      .brand img.logo-blaircode { height: 24px; }
      section.panel { padding: 78px 0 74px; }
      .panel-body { width: min(100vw - 24px, 100%); gap: 18px; }
      .copy-col { gap: 14px; }
      .eyebrow { font-size: 0.68rem; }
      h1 { font-size: clamp(2rem, 10vw, 3.2rem); }
      h2 { font-size: clamp(1.58rem, 8vw, 2.55rem); }
      .metrics-row,
      .cards-grid,
      .cards-grid.cards-grid--three,
      .flow-row,
      .role-row,
      .comparison,
      .modal-grid { grid-template-columns: 1fr; }
      .metric, .card, .flow-node, .role-card { min-height: auto; }
      .visual-shell { min-height: 260px; padding: 18px; }
      .nav-cluster { right: 12px; bottom: 14px; }
      .scroll-hint { display: none; }
      .modal-layer { padding: 14px; }
      .modal-card { padding: 20px; max-height: 90vh; }
    }

    @media (max-height: 760px) {
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-row">
        <div class="brand">

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderCards(items, className = "") {
      const computedClass = `${className} ${!className.includes("cards-grid--three") && items.length === 3 ? "cards-grid--three" : ""}`.trim();
      return `<div class="cards-grid ${computedClass}">${items.map(item => `
        <article class="card">
          <button class="hotspot" type="button" data-modal="${escapeHtml(item.modal)}">
            <div class="card-icon">${escapeHtml(item.icon)}</div>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.text)}</p>
            <span class="cta">clic para ampliar</span>
          </button>
        </article>
      `).join("")}</div>`;
    }

    function renderMetrics(items) {
      return `<div class="metrics-row">${items.map(([value, text]) => `
        <article class="metric"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(text)}</span></article>
      `).join("")}</div>`;
    }

    function renderFlow(items, className) {
      return `<div class="${className}">${items.map(item => `
        <article class="${className === "role-row" ? "role-card" : "flow-node"}">
          ${className === "role-row" ? "" : `<span class="step">${escapeHtml(item[0])}</span>`}
          <strong>${escapeHtml(className === "role-row" ? item[0] : item[1])}</strong>
          <span>${escapeHtml(className === "role-row" ? item[1] : item[2])}</span>
        </article>
      `).join("")}</div>`;
    }

    function renderComparison() {
      return `
        <div class="comparison">
          <div class="comparison-box bad">
            <h3>Fragmentado</h3>
            <ul>
              <li>Datos y decisiones separados.</li>
              <li>Más reconstrucción manual.</li>
              <li>Menos claridad para auditoría.</li>
              <li>Más fricción de reporte.</li>
            </ul>
          </div>
          <div class="comparison-box good">
            <h3>Integrado</h3>
            <ul>
              <li>Datos vinculados desde el origen.</li>
              <li>Control previo al gasto.</li>
              <li>Evidencia conectada y consultable.</li>
              <li>Más defensa institucional.</li>
            </ul>
          </div>
        </div>`;
    }

    function renderSlide(slide, index) {
      const centered = slide.single ? "centered" : "";
      const dense = slide.dense || slide.cards || slide.flow || slide.roles || slide.metrics || slide.comparison;
      const bodyClass = `${slide.single ? "panel-body panel-body--single" : "panel-body"}${dense ? " panel-body--dense" : ""}`;
      const themeClass = slide.theme ? `panel--${slide.theme}` : "";
      const cardsClass = `${slide.cardsThree ? "cards-grid--three" : ""} ${slide.cardsWide ? "cards-grid--wide" : ""}`.trim();
      const left = `
        <div class="copy-col ${centered} ${dense ? "copy-col--dense" : ""}">
          <div class="eyebrow">${escapeHtml(slide.eyebrow)}</div>
          ${index === 0 ? `<h1>${escapeHtml(slide.title)}</h1>` : `<h2>${escapeHtml(slide.title)}</h2>`}
          <p class="lede">${escapeHtml(slide.lede)}</p>
          ${slide.support ? `<p class="support-line">${escapeHtml(slide.support)}</p>` : ""}
          ${slide.tags ? `<div class="keyline">${slide.tags.map(tag => `<span class="tag${/roles|módulo/i.test(tag) ? " tag--warm" : ""}">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
          ${slide.metrics ? renderMetrics(slide.metrics) : ""}
          ${slide.cards ? renderCards(slide.cards, cardsClass) : ""}
          ${slide.flow ? renderFlow(slide.flow, "flow-row") : ""}
          ${slide.roles ? renderFlow(slide.roles, "role-row") : ""}
          ${slide.comparison ? renderComparison() : ""}
        </div>`;
      const visual = slide.visual ? `<div class="visual-col">${visualMarkup(slide.visual, slide.modal)}</div>` : "";
      return `
        <section class="panel ${themeClass}" data-index="${index}">
          <div class="outer">
            <div class="inner">
              <div class="panel-bg"></div>
              <div class="${bodyClass}">
                ${left}
                ${slide.single ? "" : visual}
              </div>
            </div>
          </div>
        </section>`;
    }

    document.getElementById("deck").innerHTML = slides.map(renderSlide).join("");

    const sections = document.querySelectorAll(".panel");
    const outerWrappers = gsap.utils.toArray(".outer");
    const innerWrappers = gsap.utils.toArray(".inner");
    const progressBar = document.getElementById("progressBar");
    const counterText = document.getElementById("counterText");

    const modalTitle = document.getElementById("modalTitle");

    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");
    const autoBtn = document.getElementById("autoBtn");

    let currentIndex = -1;
    let animating = false;
    let autoMode = false;
    let autoTimer = null;
    const wrap = gsap.utils.wrap(0, sections.length);

    gsap.set(outerWrappers, { yPercent: 100 });
    gsap.set(innerWrappers, { yPercent: -100 });

    function updateUi(index) {
      counterText.textContent = `${index + 1} / ${slides.length}`;
      progressBar.style.width = `${((index + 1) / slides.length) * 100}%`;
    }

    function animateElements(scope, direction) {
      const items = scope.querySelectorAll(".eyebrow, h1, h2, .lede, .support-line, .tag, .metric, .card, .visual-shell, .flow-node, .role-card, .comparison-box");
      gsap.fromTo(items, { autoAlpha: 0, yPercent: 22 * direction, scale: 0.985 }, {
        autoAlpha: 1,
        yPercent: 0,
        scale: 1,
        duration: 0.86,
        ease: "power2.out",
        stagger: 0.03,
        overwrite: true
      });
    }

    function gotoSection(index, direction) {
      index = wrap(index);
      if (animating) return;
      animating = true;

      const factor = direction === -1 ? -1 : 1;
      const target = sections[index];
      const targetBg = target.querySelector(".panel-bg");
      const current = currentIndex >= 0 ? sections[currentIndex] : null;
      const currentBg = current ? current.querySelector(".panel-bg") : null;

      const tl = gsap.timeline({
        defaults: { duration: 1.1, ease: "power2.inOut" },
        onComplete: () => {
          currentIndex = index;
          updateUi(index);
          animating = false;
        }
      });

      if (current) {
        gsap.set(current, { zIndex: 0 });
        tl.to(currentBg, { yPercent: -8 * factor, scale: 1.04 }, 0)
          .to(current, { autoAlpha: 0 }, 0.34);
      }

      gsap.set(target, { autoAlpha: 1, zIndex: 1 });
      tl.fromTo([outerWrappers[index], innerWrappers[index]], {
        yPercent: i => i ? -100 * factor : 100 * factor
      }, { yPercent: 0 }, 0)
        .fromTo(targetBg, { yPercent: 12 * factor, scale: 1.08 }, { yPercent: 0, scale: 1 }, 0);

      animateElements(target, factor);
    }

    function startAuto() {
      autoMode = true;
      autoBtn.textContent = "Manual";
      clearInterval(autoTimer);
      autoTimer = setInterval(() => {
        if (!animating && !modalLayer.classList.contains("active")) gotoSection(currentIndex + 1, 1);
      }, 5000);
    }

    function stopAuto() {
      autoMode = false;
      autoBtn.textContent = "Auto";
      clearInterval(autoTimer);
      autoTimer = null;
    }

    function renderModalContent(entry) {
      const boxes = entry.blocks ? `<div class="modal-grid">${entry.blocks.map(block => `
        <div class="modal-box">
          <h4>${escapeHtml(block.title)}</h4>
          <p>${escapeHtml(block.body)}</p>
        </div>`).join("")}</div>` : "";
      const bullets = entry.bullets && entry.bullets.length ? `
        <div class="modal-box">
          <h4>Claves de lectura</h4>
          <ul>${entry.bullets.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </div>` : "";
      return boxes + bullets;
    }

    function openModal(key) {
      const entry = modalContent[key];
      if (!entry) return;
      modalTitle.textContent = entry.title;
      modalIntro.textContent = entry.intro;
      modalBody.innerHTML = renderModalContent(entry);
      modalLayer.classList.add("active");
      modalLayer.setAttribute("aria-hidden", "false");
      stopAuto();
      gsap.fromTo(".modal-card", { autoAlpha: 0, y: 28, scale: 0.96 }, {
        autoAlpha: 1,
        y: 0,
        scale: 1,
        duration: 0.45,
        ease: "back.out(1.5)"
      });
    }

    function closeModal() {
      modalLayer.classList.remove("active");
      modalLayer.setAttribute("aria-hidden", "true");
    }

    Observer.create({
      type: "wheel,touch",
      wheelSpeed: -1,
      tolerance: 12,
      preventDefault: true,
      onDown: () => !animating && !modalLayer.classList.contains("active") && gotoSection(currentIndex + 1, 1),
      onUp: () => !animating && !modalLayer.classList.contains("active") && gotoSection(currentIndex - 1, -1)
    });

    document.getElementById("nextBtn").addEventListener("click", () => gotoSection(currentIndex + 1, 1));
    document.getElementById("prevBtn").addEventListener("click", () => gotoSection(currentIndex - 1, -1));
    autoBtn.addEventListener("click", () => autoMode ? stopAuto() : startAuto());

    modalClose.addEventListener("click", closeModal);
    modalLayer.addEventListener("click", event => {
      if (event.target === modalLayer) closeModal();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();
      if (modalLayer.classList.contains("active")) return;
      if (event.key === "ArrowDown" || event.key === "ArrowRight") gotoSection(currentIndex + 1, 1);
      if (event.key === "ArrowUp" || event.key === "ArrowLeft") gotoSection(currentIndex - 1, -1);
      const modalTarget = document.activeElement?.dataset?.modal;
      if ((event.key === "Enter" || event.key === " ") && modalTarget) openModal(modalTarget);
    });

    document.addEventListener("click", event => {
      const trigger = event.target.closest("[data-modal]");
      if (trigger) openModal(trigger.dataset.modal);
    });

    gotoSection(0, 1);
  </script>
</body>
</html>
